name: desktop-hwsim

# Privileged mac80211_hwsim no-leak harness (ROADMAP P0.2): drives the REAL
# gatepath-netns-helper end-to-end on a virtual radio — PHY move into a throwaway
# netns, in-netns wpa_supplicant + DHCP, portal, and the trusted-net sentinel.
# Ported from the Bazzite dev box to a GitHub-hosted Ubuntu VM runner (a VM, not a
# container, so it has CAP_SYS_ADMIN + kernel-module load). Starts manual + on PRs
# that touch the harness/helper; promote to a required check once it's proven green.
on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'tests/e2e-hwsim/**'
      - 'desktop/gatepath-netns-helper/**'
      - 'mockportal/**'
      - '.github/workflows/desktop-hwsim.yml'

jobs:
  e2e-hwsim:
    name: Desktop E2E (mac80211_hwsim, privileged)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps + mac80211_hwsim for this kernel
        run: |
          set -euxo pipefail
          sudo apt-get update
          # mac80211_hwsim ships in linux-modules-extra for the running kernel.
          # If this package is missing for the runner's kernel, the preflight
          # gate below fails loudly (the harness can't run without the module).
          sudo apt-get install -y "linux-modules-extra-$(uname -r)"
          sudo apt-get install -y \
            iw wpasupplicant dnsmasq-base network-manager \
            dbus python3-dbus curl jq

      - name: Preflight gate — load mac80211_hwsim + move a PHY into a netns
        run: |
          set -uxo pipefail
          # preflight.sh is read-mostly and always exits 0 (it prints a summary +
          # cleans up its probe netns / unloads the module via an EXIT trap), so we
          # gate on its reported must-haves rather than its exit code.
          sudo bash tests/e2e-hwsim/preflight.sh | tee /tmp/hwsim-preflight.out
          for must in hwsim_module=yes hwsim_load=yes phy_move=yes; do
            grep -q "$must" /tmp/hwsim-preflight.out \
              || { echo "::error::hwsim substrate unavailable on this runner ($must)"; exit 1; }
          done

      - name: Start NetworkManager (runner uplink left unmanaged)
        run: |
          set -euxo pipefail
          # The harness needs NM active, but GH runners don't run it. Start it
          # WITHOUT letting it grab the runner's primary NIC (that would drop the
          # job's connectivity) — mark the default-route iface unmanaged first.
          PRIMARY="$(ip route show default | awk '{print $5; exit}')"
          echo "runner uplink left unmanaged: ${PRIMARY:-<none>}"
          sudo install -d /etc/NetworkManager/conf.d
          printf '[keyfile]\nunmanaged-devices=interface-name:%s\n' "$PRIMARY" \
            | sudo tee /etc/NetworkManager/conf.d/00-gatepath-unmanage-uplink.conf
          sudo systemctl start NetworkManager
          for _ in $(seq 1 15); do
            systemctl is-active --quiet NetworkManager && break || sleep 1
          done
          systemctl is-active --quiet NetworkManager
          nmcli -t -f DEVICE,TYPE,STATE device || true

      - name: Build the privileged helper
        run: bash tests/e2e-hwsim/build-helper.sh

      - name: Run the hwsim no-leak harness
        run: sudo bash tests/e2e-hwsim/run.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-hwsim-artifacts
          path: |
            /tmp/gatepath-hwsim*
            /tmp/hwsim-preflight.out
          if-no-files-found: ignore
