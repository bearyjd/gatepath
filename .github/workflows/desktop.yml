name: desktop

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'mockportal/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - 'mockportal/**'
      - '.github/workflows/desktop.yml'

jobs:
  pytest:
    name: pytest desktop + mockportal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install system deps for PyGObject + dbus-daemon
        # gir1.2-glib-2.0 + libgirepository*-dev + libcairo2-dev + pkg-config
        # are what dasbus (via PyGObject/Gio) needs to build; libdbus-1-dev is
        # what pip needs to build dbus-python (pulled in by python-dbusmock —
        # the runner image stopped preinstalling the header, 2026-07); dbus +
        # dbus-x11 give the python-dbusmock NM wire-contract test a real dbus-daemon
        # to spawn a private bus against (no root/system-bus access needed —
        # DBusTestCase.start_system_bus() only touches its own private bus).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev libgirepository-2.0-dev libcairo2-dev \
            libdbus-1-dev pkg-config python3-dev gir1.2-glib-2.0 dbus dbus-x11 || \
          sudo apt-get install -y \
            libgirepository1.0-dev libcairo2-dev libdbus-1-dev pkg-config python3-dev \
            gir1.2-glib-2.0 dbus dbus-x11
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml dasbus PyGObject python-dbusmock
      - name: Validate Flatpak manifest YAML
        run: |
          python -c "import yaml; yaml.safe_load(open('desktop/com.ventouxlabs.Gatepath.yml'))"
      - name: Run pytest
        run: python -m pytest desktop/ mockportal/ -v
      - name: Verify --help works without GTK
        env:
          PYTHONPATH: desktop
        run: python -m gatepath --help

  forbidden-imports:
    name: grep — no requests/httpx/aiohttp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: No forbidden HTTP libs in gatepath/
        run: |
          if grep -rE '\b(import requests|from requests|import httpx|from httpx|import aiohttp|from aiohttp)\b' desktop/gatepath/; then
            echo "::error::Forbidden HTTP library import found in desktop/gatepath/"
            exit 1
          fi
      - name: diag/ stays pure — no platform imports
        # The diagnostics package is pure logic over an injected ProbeContext:
        # every probe must be unit-testable with fakes, and importing it must
        # not drag in I/O. All platform reads belong in gatepath/diag_context.py
        # and gatepath/http_fetcher.py, which live outside the package.
        # Machine-checked rather than trusted, per this repo's convention for
        # cross-cutting invariants (cf. schema-parity.yml).
        run: |
          if grep -rnE '^\s*(import|from)\s+(urllib\.request|urllib\.error|socket|os|dasbus|gi)\b' desktop/gatepath/diag/; then
            echo "::error::desktop/gatepath/diag/ must stay pure — move platform reads to diag_context.py"
            exit 1
          fi
          python3 - <<'EOF'
          import sys
          sys.path.insert(0, "desktop")
          import gatepath.diag.engine  # noqa: F401
          import gatepath.diag.dns_hijack_probe  # noqa: F401
          leaked = [m for m in ("urllib.request", "socket", "dasbus", "gi") if m in sys.modules]
          if leaked:
              print(f"::error::importing diag/ pulled in {leaked} at runtime")
              sys.exit(1)
          print("diag/ is pure at import time")
          EOF

  rust-helper:
    name: cargo test (gatepath-netns-helper)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/gatepath-netns-helper
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --all-targets

  cargo-audit:
    name: cargo audit (gatepath-netns-helper)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/gatepath-netns-helper
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        # Scans the committed Cargo.lock against the RustSec advisory DB.
        # Fails on actual vulnerabilities (the CVE gate a privileged root
        # helper warrants); unmaintained/yanked warnings are reported but
        # don't fail the build (avoids flaking on transitive advisory noise).
        #
        # Non-determinism note: the advisory DB is fetched fresh each run, so a
        # newly-published CVE can turn a previously-green PR red with no code
        # change. That is the intended tripwire — a red here usually means
        # "a dependency advisory just dropped", not "this PR broke something".
        run: cargo audit

  flatpak-build:
    name: flatpak-builder bundle
    runs-on: ubuntu-latest
    # bilelmoussaoui/flatpak-github-actions ships a container with flatpak,
    # flatpak-builder, and the GNOME 47 SDK pre-installed. --privileged is
    # required for bubblewrap (the sandbox flatpak-builder uses).
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v7
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: gatepath.flatpak
          manifest-path: desktop/com.ventouxlabs.Gatepath.yml
          cache-key: flatpak-builder-${{ hashFiles('desktop/com.ventouxlabs.Gatepath.yml') }}

  build-sysext:
    name: build sysext (gatepath-netns-helper)
    runs-on: ubuntu-latest
    # Assembles the helper into a systemd-sysext image (squashfs .raw) — the
    # primary deployment path for immutable/atomic distros (Bazzite, Fedora
    # Atomic), where the helper's /usr-only files overlay a read-only /usr.
    # Builds + structurally validates the image and uploads it as an artifact.
    # (A real `systemd-sysext merge` smoke-test needs a privileged host; see
    # docs/DESKTOP_NETNS_DEPLOYMENT.md.)
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/gatepath-netns-helper
      - name: Install squashfs-tools
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools
      - name: Build sysext image
        run: desktop/gatepath-netns-helper/packaging/build-sysext.sh
      - name: Validate sysext layout
        run: desktop/gatepath-netns-helper/packaging/validate-sysext.sh desktop/gatepath-netns-helper/dist/gatepath-netns-helper.raw
      - name: Upload sysext artifact
        uses: actions/upload-artifact@v7
        with:
          name: gatepath-netns-helper-sysext
          path: desktop/gatepath-netns-helper/dist/gatepath-netns-helper.raw
          if-no-files-found: error
