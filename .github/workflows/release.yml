name: release

# Tag-triggered Android release pipeline (ROADMAP P2.2). Push a tag like
# `v1.0.0` to build the release AAB + APK, generate an SBOM, and publish a
# GitHub Release with all three.
#
# Signing is OPTIONAL: configure the four ANDROID_* secrets (see
# docs/RELEASING.md) and the artifacts are signed with your keystore; without
# them the pipeline still runs and produces UNSIGNED artifacts (clearly labelled
# in the release notes). The keystore is NEVER stored in the repo.
#
# F-Droid is a separate channel: it builds from source and signs with its OWN
# key, so it needs the in-repo fastlane metadata + a build recipe, not these
# secrets. Desktop artifacts (the sysext) are not part of this workflow yet —
# see docs/DESKTOP_NETNS_DEPLOYMENT.md and the "signed releases" follow-up.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release

jobs:
  android-release:
    name: Android release (AAB + APK + SBOM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3

      - name: Decode signing keystore (if configured)
        id: keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${KS_B64:-}" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Keystore configured — building SIGNED artifacts."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — building UNSIGNED artifacts."
          fi

      - name: Build release AAB + APK
        working-directory: android
        env:
          # Empty when no keystore → build.gradle.kts treats it as absent and
          # leaves the release unsigned.
          GATEPATH_KEYSTORE_FILE: ${{ steps.keystore.outputs.present == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          GATEPATH_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GATEPATH_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          GATEPATH_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:bundleRelease :app:assembleRelease

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: gatepath-sbom.cdx.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNED: ${{ steps.keystore.outputs.present }}
        run: |
          set -euo pipefail
          shopt -s failglob   # a zero-artifact build fails loudly, not with a literal glob
          notes="Automated release for ${GITHUB_REF_NAME}."
          if [ "$SIGNED" != "true" ]; then
            notes="${notes}

          > ⚠️ These artifacts are **UNSIGNED** (no signing keystore was configured for this build). Do not distribute; see docs/RELEASING.md."
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "$notes" \
            android/app/build/outputs/bundle/release/*.aab \
            android/app/build/outputs/apk/release/*.apk \
            gatepath-sbom.cdx.json
