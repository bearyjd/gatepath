name: release

# Tag-triggered Android release pipeline (ROADMAP P2.2). Push a tag like
# `v1.0.0` to build the release AAB + APK, generate an SBOM, and publish a
# GitHub Release with all three.
#
# Two independent kinds of signing happen here:
#  1. Android keystore signing (OPTIONAL): configure the four ANDROID_* secrets
#     (see docs/RELEASING.md) and the AAB/APK are signed with your keystore;
#     without them the pipeline still runs and produces artifacts UNSIGNED by the
#     keystore (clearly labelled in the release notes). The keystore is NEVER
#     stored in the repo.
#  2. Keyless cosign provenance (ALWAYS): every published artifact is signed via
#     Sigstore keyless signing (GitHub OIDC → Fulcio → Rekor), producing a
#     `.cosign.bundle` per artifact. No long-lived keys; needs `id-token: write`.
#     This attests provenance (came from this workflow) independently of #1.
#
# F-Droid is a separate channel: it builds from source and signs with its OWN
# key, so it needs the in-repo fastlane metadata + a build recipe, not these
# secrets.
#
# Desktop artifacts ARE part of this workflow: the netns-helper systemd-sysext
# image (`*.raw`) and the Flatpak bundle (`*.flatpak`) are built, keyless-cosign
# signed, and attached to the same Release (jobs `sysext-release` +
# `flatpak-build`/`flatpak-release`). They carry the same provenance as the
# Android artifacts and verify with the same recipe (docs/RELEASING.md §4) — the
# signing identity is this workflow file, regardless of artifact.
on:
  push:
    tags:
      - 'v*'

# Least privilege: default read-only. Each job that publishes to the Release or
# cosign-signs requests `contents: write` / `id-token: write` for itself; the
# build-only `flatpak-build` job stays read-only.
permissions:
  contents: read

jobs:
  android-release:
    name: Android release (AAB + APK + SBOM)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # keyless cosign signing via GitHub OIDC (Fulcio/Rekor)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v4

      - name: Decode signing keystore (if configured)
        id: keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${KS_B64:-}" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Keystore configured — building SIGNED artifacts."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — building UNSIGNED artifacts."
          fi

      - name: Build release AAB + APK
        working-directory: android
        env:
          # Empty when no keystore → build.gradle.kts treats it as absent and
          # leaves the release unsigned.
          GATEPATH_KEYSTORE_FILE: ${{ steps.keystore.outputs.present == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          GATEPATH_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GATEPATH_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          GATEPATH_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:bundleRelease :app:assembleRelease

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: gatepath-sbom.cdx.json

      # Collect everything that ships into one dir so cosign can sign each blob
      # and the release upload is a single glob (artifacts + their .cosign.bundle).
      - name: Stage release artifacts
        run: |
          set -euo pipefail
          shopt -s failglob   # a zero-artifact build fails loudly, not with a literal glob
          mkdir -p release-artifacts
          cp android/app/build/outputs/bundle/release/*.aab release-artifacts/
          cp android/app/build/outputs/apk/release/*.apk release-artifacts/
          cp gatepath-sbom.cdx.json release-artifacts/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless provenance signing (Sigstore): the workflow's short-lived OIDC
      # token → Fulcio cert → Rekor transparency log. No long-lived keys. Each
      # artifact gets a self-contained `<name>.cosign.bundle` a verifier checks
      # with `cosign verify-blob --bundle ...` (recipe in docs/RELEASING.md).
      # This is provenance for the RELEASE PIPELINE, independent of (and in
      # addition to) the Android keystore signature above.
      - name: Sign artifacts with keyless cosign
        working-directory: release-artifacts
        env:
          COSIGN_YES: "true"   # non-interactive: accept the Rekor transparency-log entry
        run: |
          set -euo pipefail
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.cosign.bundle) continue ;; esac
            echo "cosign sign-blob: $f"
            cosign sign-blob --yes --bundle "${f}.cosign.bundle" "$f"
          done
          ls -la

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNED: ${{ steps.keystore.outputs.present }}
        run: |
          set -euo pipefail
          shopt -s failglob   # a zero-artifact build fails loudly, not with a literal glob
          notes="Automated release for ${GITHUB_REF_NAME}.

          **Provenance:** every artifact is signed with keyless \`cosign\` (Sigstore) — each has a companion \`.cosign.bundle\`. Verify with \`cosign verify-blob\` (see docs/RELEASING.md §4). This attests the artifact came from this release workflow; it is separate from the Android app signature."
          if [ "$SIGNED" != "true" ]; then
            notes="${notes}

          > ⚠️ These artifacts are **UNSIGNED by the Android keystore** (no signing keystore was configured for this build). The cosign provenance above still applies, but the app itself is not release-signed — do not distribute; see docs/RELEASING.md."
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "$notes" \
            release-artifacts/*

  # ---------------------------------------------------------------------------
  # Desktop artifacts: built here, keyless-cosign signed, and attached to the
  # SAME Release the android-release job creates (hence `needs: android-release`,
  # so `gh release upload` targets an existing Release). Same provenance model as
  # the Android artifacts — signed by this workflow's OIDC identity (§4 recipe).
  # ---------------------------------------------------------------------------
  sysext-release:
    name: Desktop sysext (.raw) — sign + attach
    runs-on: ubuntu-latest
    needs: android-release
    permissions:
      contents: write   # gh release upload
      id-token: write   # keyless cosign signing
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install squashfs-tools
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools
      - name: Build sysext image
        run: desktop/gatepath-netns-helper/packaging/build-sysext.sh
      - name: Validate sysext layout
        run: desktop/gatepath-netns-helper/packaging/validate-sysext.sh desktop/gatepath-netns-helper/dist/gatepath-netns-helper.raw

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign sysext with keyless cosign
        working-directory: desktop/gatepath-netns-helper/dist
        env:
          COSIGN_YES: "true"   # non-interactive: accept the Rekor transparency-log entry
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle gatepath-netns-helper.raw.cosign.bundle \
            gatepath-netns-helper.raw
          ls -la

      - name: Attach to Release
        working-directory: desktop/gatepath-netns-helper/dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # --clobber so a re-run after a partial/transient upload succeeds
          # instead of aborting on an already-attached asset.
          gh release upload "$GITHUB_REF_NAME" \
            gatepath-netns-helper.raw \
            gatepath-netns-helper.raw.cosign.bundle \
            --clobber

  flatpak-build:
    name: Desktop Flatpak — build bundle
    runs-on: ubuntu-latest
    # Build-only: no Release access and no cosign here. The bundle is signed +
    # attached by flatpak-release, which runs outside this privileged container
    # (cosign/gh aren't present in the flatpak-builder image). Mirrors
    # desktop.yml's flatpak job.
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v7
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: gatepath.flatpak
          manifest-path: desktop/com.ventouxlabs.Gatepath.yml
          cache-key: flatpak-builder-${{ hashFiles('desktop/com.ventouxlabs.Gatepath.yml') }}
      - name: Upload flatpak bundle for the signing job
        uses: actions/upload-artifact@v7
        with:
          name: gatepath-flatpak-bundle
          path: gatepath.flatpak
          if-no-files-found: error

  flatpak-release:
    name: Desktop Flatpak — sign + attach
    runs-on: ubuntu-latest
    needs: [android-release, flatpak-build]
    permissions:
      contents: write   # gh release upload
      id-token: write   # keyless cosign signing
    steps:
      - name: Download flatpak bundle
        uses: actions/download-artifact@v7
        with:
          name: gatepath-flatpak-bundle
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign flatpak with keyless cosign
        env:
          COSIGN_YES: "true"   # non-interactive: accept the Rekor transparency-log entry
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle gatepath.flatpak.cosign.bundle \
            gatepath.flatpak
          ls -la
      - name: Attach to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # --clobber so a re-run after a partial/transient upload succeeds
          # instead of aborting on an already-attached asset.
          gh release upload "$GITHUB_REF_NAME" \
            gatepath.flatpak \
            gatepath.flatpak.cosign.bundle \
            --clobber
