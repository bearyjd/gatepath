<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  System D-Bus policy for gatepath-netns-helper.

  Only root owns the bus name. Any local user can call the methods, but
  PolicyKit (com.ventouxlabs.Gatepath.NetNsHelper.SetupCaptive /
  .TeardownCaptive) gates whether the call is actually authorised.
  PolicyKit can show the user an auth prompt if the policy requires it.
-->
<busconfig>
  <policy user="root">
    <allow own="com.ventouxlabs.Gatepath.NetNsHelper"/>
  </policy>

  <policy context="default">
    <allow send_destination="com.ventouxlabs.Gatepath.NetNsHelper"
           send_interface="com.ventouxlabs.Gatepath.NetNsHelper1"/>
    <allow send_destination="com.ventouxlabs.Gatepath.NetNsHelper"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="com.ventouxlabs.Gatepath.NetNsHelper"
           send_interface="org.freedesktop.DBus.Peer"/>
  </policy>
</busconfig>
