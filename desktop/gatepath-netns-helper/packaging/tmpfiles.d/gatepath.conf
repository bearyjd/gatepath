# Audit-log state directory for gatepath-netns-helper.
#
# The systemd unit's StateDirectory=gatepath already creates this (mode 0750)
# on first start. This tmpfiles.d drop-in makes the directory exist as soon as
# the sysext is merged and `systemd-tmpfiles --create` runs — independent of
# whether the unit has been started yet — and pins ownership/mode for the
# audit log (helper-audit.jsonl, opened 0640; see src/audit_log.rs).
d /var/lib/gatepath 0750 root root -

# Audit-log rotation policy. A sysext overlays only /usr, never /etc, so the
# logrotate config is shipped under /usr/share/factory/etc/ and copied into
# place here (the `C` type copies from the factory tree when the destination
# does not yet exist). Bounds audit-log growth so a caller spamming SetupCaptive
# cannot exhaust the disk. Operator-edited copies are preserved (C won't clobber).
C /etc/logrotate.d/gatepath-netns-helper 0644 root root - -
