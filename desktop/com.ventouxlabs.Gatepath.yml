app-id: com.ventouxlabs.Gatepath
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: gatepath

# Sandbox is Wayland-only by design. Spec explicitly forbids --socket=x11.
# Spec explicitly forbids --filesystem=home and --device=all.
finish-args:
  - --socket=wayland
  - --share=ipc
  - --share=network
  - --system-talk-name=org.freedesktop.NetworkManager
  - --system-talk-name=org.freedesktop.resolve1
  - --filesystem=xdg-data/gatepath:create
  - --filesystem=xdg-cache/gatepath:create
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: python3-dasbus
    buildsystem: simple
    build-commands:
      # --no-build-isolation: pip 25+ (GNOME 49 / Python 3.13) defaults to
      # PEP 517 isolation, which fetches setuptools from PyPI to build the
      # wheel. Combined with --no-index that fails. The GNOME SDK already
      # ships setuptools, so use the system one and skip isolation.
      - pip3 install --no-index --no-build-isolation --find-links=. --prefix=${FLATPAK_DEST} dasbus
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/37/79/9c5984d723ffbe2e839ee649690f3e1fa6544ab6a17a5150e5ac14a47072/dasbus-1.7.tar.gz
        sha256: a8850d841adfe8ee5f7bb9f82cf449ab9b4950dc0633897071718e0d0036b6f6

  - name: gatepath
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --no-build-isolation --prefix=${FLATPAK_DEST} .
      - install -Dm644 com.ventouxlabs.Gatepath.desktop ${FLATPAK_DEST}/share/applications/com.ventouxlabs.Gatepath.desktop
      - install -Dm644 com.ventouxlabs.Gatepath.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.ventouxlabs.Gatepath.metainfo.xml
      # Pre-rendered PNGs at canonical hicolor sizes. We skip installing the
      # SVG because appstreamcli compose's icon validator runs the SVG through
      # librsvg at compose time and reports icon-file-read-error on the file
      # (even when it parses as valid XML). Shipping rasters sidesteps that
      # validation step. The SVG is retained in the repo as the source-of-truth
      # artwork; PNGs are regenerated via `rsvg-convert` when the SVG changes.
      - install -Dm644 com.ventouxlabs.Gatepath-64.png ${FLATPAK_DEST}/share/icons/hicolor/64x64/apps/com.ventouxlabs.Gatepath.png
      - install -Dm644 com.ventouxlabs.Gatepath-128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.ventouxlabs.Gatepath.png
      - install -Dm644 com.ventouxlabs.Gatepath-256.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/com.ventouxlabs.Gatepath.png
    sources:
      - type: dir
        path: .
