<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  Allow root to own org.freedesktop.NetworkManager on the system bus.
  python-dbusmock runs as root (inherits from the test entrypoint) and
  claims that name to satisfy the real NM client code paths in both the
  Python desktop app and the Rust helper.

  Test scope only — never installed on real systems. The shipped policy
  for NetworkManager lives in the NetworkManager package itself.
-->
<busconfig>
  <policy user="root">
    <allow own="org.freedesktop.NetworkManager"/>
  </policy>
  <policy context="default">
    <allow send_destination="org.freedesktop.NetworkManager"/>
    <allow send_destination="org.freedesktop.NetworkManager"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="org.freedesktop.NetworkManager"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="org.freedesktop.NetworkManager"
           send_interface="org.freedesktop.DBus.Peer"/>
  </policy>
</busconfig>
