# DNS hijack: every A query resolves to the gateway IP. This is how real
# captive APs force every probe (connectivitycheck.gstatic.com,
# nmcheck.gnome.org, captive.apple.com, the user's own bookmark, ...) onto
# the local intercept.
address=/#/172.30.0.2

# Refuse forwarding upstream. A real captive AP doesn't proxy DNS until the
# user authenticates, and Gatepath's probe sequence assumes hijack.
no-resolv
no-poll
# Bind to the interface dnsmasq sees; never exit if the iface isn't ready
# the instant we start.
bind-dynamic

# DHCP intentionally disabled. The client gets its main-netns IP from
# podman IPAM at container start, and the test wrapper pins a static IP
# inside the gatepath netns after the helper moves wlan0 in. Running
# DHCP here would need CAP_NET_RAW (for raw-socket BPF filters) which
# the rootless podman default doesn't grant. If a future scenario needs
# real DHCP lease behavior, add `cap_add: NET_RAW` to the gateway
# service in compose.yml and re-add `dhcp-range=…` here.

# Log queries for debugging the harness.
log-queries
log-facility=-
