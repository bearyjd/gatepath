worker_processes 1;
error_log /dev/stderr info;
daemon off;
pid /run/nginx.pid;

events { worker_connections 256; }

http {
    access_log /dev/stdout;
    sendfile on;
    server_tokens off;
    # Tighten reasonable defaults; this is a test container so we don't
    # bother with TLS, but we keep the interceptor honest.
    client_max_body_size 64k;

    # mockportal lives inside the gateway, bound to loopback only — see
    # mockportal/server.py for the reason it refuses to bind elsewhere.
    upstream mockportal { server 127.0.0.1:18080; }

    server {
        # default_server makes us answer every Host: header. Real captive
        # gateways do this — your browser asks for example.com, the
        # operator's nginx says "no, /portal".
        listen 80 default_server;
        server_name _;

        # Preserve the original Host header end-to-end so the mockportal
        # /log records which hostname the captive client thought it was
        # talking to. That's the assertion oracle for "WebView blocked the
        # evil-tracker subresource" — if the tracker hostname shows up in
        # /log, blocking failed.
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;

        # mockportal contract endpoints — proxy straight through. The
        # Python server generates absolute Location headers pointing at
        # 127.0.0.1:18080; proxy_redirect rewrites those to relative so
        # the captive client's browser stays on whatever hostname it
        # was originally asking for.
        location = /portal { proxy_pass http://mockportal; proxy_redirect ~^http://[^/]+/ /; }
        location = /login  { proxy_pass http://mockportal; proxy_redirect ~^http://[^/]+/ /; }
        location = /reset  { proxy_pass http://mockportal; }
        location = /log    { proxy_pass http://mockportal; }

        # Every other path — including the well-known probe targets used
        # by Gatepath (connectivity-check.ubuntu.com/), GNOME
        # (nmcheck.gnome.org/check_network_status.txt), Android
        # (connectivitycheck.gstatic.com/generate_204), and Apple
        # (captive.apple.com/hotspot-detect.html) — gets proxied to the
        # mockportal probe endpoint so the redirect-counter advances
        # exactly the way real captive APs make probes advance their
        # session state. Mockportal answers 302 → /portal until the
        # PORTAL_COMPLETE_AFTER threshold is met, then 204.
        location / {
            proxy_pass http://mockportal/generate_204;
            proxy_redirect ~^http://[^/]+/ /;
        }
    }
}
